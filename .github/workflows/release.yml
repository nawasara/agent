name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-s -w -X github.com/nawasara/agent/internal/reporter.Version=${VERSION}"

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="$LDFLAGS" \
            -o dist/nawasara-agent-linux-amd64 ./cmd/agent

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -ldflags="$LDFLAGS" \
            -o dist/nawasara-agent-linux-arm64 ./cmd/agent

          # Checksums
          cd dist
          sha256sum nawasara-agent-linux-amd64 nawasara-agent-linux-arm64 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nawasara-agent-linux-amd64
            dist/nawasara-agent-linux-arm64
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
